<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운세인사이트 — UNSE INSIGHT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400&family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --burg-deep:#3a0a18;
  --burg-mid:#5a1828;
  --burg-soft:#7a2838;
  --burg-light:#9a3848;
  --burg-pale:#f5e8ec;
  --burg-border:#8a3040;
  --cream:#fdf6f0;
  --cream2:#f5ede4;
  --t1:#2a0810;
  --t2:#6a2030;
  --t3:#9a6068;
  --t4:#c8a0a8;
  --bd:#e0c8cc;
  --bd2:#d0b0b8;
}

html,body{height:100%;background:var(--cream);}
body{font-family:'Noto Sans KR',sans-serif;color:var(--t1);}

/* 모바일 중앙 정렬 */
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  background:var(--cream);
  display:flex;
  flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,0,0.12);
}

/* 네비 */
.nav{
  height:58px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 16px;
  background:var(--burg-deep);
  flex-shrink:0;
}
.nav-logo-wrap{display:flex;align-items:center;gap:10px;}
.nav-text{display:flex;flex-direction:column;gap:1px;}
.nav-main{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:200;color:#f0d8dc;letter-spacing:2px;}
.nav-eng{font-family:'Cormorant Garamond',serif;font-size:10px;color:#9a6068;letter-spacing:3px;}
.nav-icons{display:flex;gap:16px;}
.nav-ico{font-size:20px;color:#9a6068;cursor:pointer;transition:color .2s;}
.nav-ico:hover{color:#d4a0a8;}

/* 히어로 */
.hero{
  background:var(--burg-deep);
  padding:20px 20px 24px;
  border-bottom:1px solid var(--burg-mid);
  flex-shrink:0;
}
.hero-greeting{font-size:10px;color:#9a6068;letter-spacing:3px;margin-bottom:8px;}
.hero-title{
  font-family:'Noto Serif KR',serif;
  font-size:20px;font-weight:200;
  color:#f0d8dc;line-height:1.8;margin-bottom:14px;
}
.hero-title span{color:#d4a0a8;}
.today-box{
  background:var(--burg-mid);
  border:0.5px solid var(--burg-border);
  padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
}
.today-label{font-size:10px;color:#9a6068;letter-spacing:2px;margin-bottom:3px;}
.today-val{font-size:13px;color:#f0d8dc;font-family:'Noto Serif KR',serif;font-weight:200;}
.today-star{font-size:20px;color:#d4a0a8;text-align:right;}
.today-starlabel{font-size:10px;color:#9a6068;margin-top:2px;text-align:right;}

/* 카테고리 */
.cats{
  display:flex;
  background:#fff;
  border-bottom:1px solid var(--bd);
  overflow-x:auto;
  scrollbar-width:none;
  flex-shrink:0;
}
.cats::-webkit-scrollbar{display:none;}
.cat{
  flex:1;min-width:64px;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s;gap:3px;
}
.cat.on{border-bottom-color:var(--burg-soft);}
.cat-ico{
  font-family:'Noto Serif KR',serif;
  font-size:15px;color:var(--t4);transition:color .2s;
}
.cat.on .cat-ico{color:var(--burg-soft);}
.cat-nm{font-size:10px;color:var(--t3);letter-spacing:1px;transition:color .2s;}
.cat.on .cat-nm{color:var(--burg-soft);}

/* 채팅 영역 */
.chat-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.chat-area{
  flex:1;overflow-y:auto;
  padding:14px 16px;
  display:flex;flex-direction:column;gap:10px;
}
.intro-card{
  background:#fff;
  border:1px solid var(--bd);
  border-left:3px solid var(--burg-soft);
  padding:14px 16px;
  border-radius:0 6px 6px 0;
}
.intro-title{
  font-family:'Noto Serif KR',serif;
  font-size:13px;color:var(--burg-soft);
  margin-bottom:4px;letter-spacing:1px;
}
.intro-sub{font-size:12px;color:var(--t3);line-height:1.8;}
.quick{display:flex;flex-wrap:wrap;gap:6px;}
.qbtn{
  padding:7px 13px;
  background:#fff;border:1px solid var(--bd2);
  color:var(--t2);font-size:11px;letter-spacing:1px;
  cursor:pointer;border-radius:20px;
  transition:all .2s;
  font-family:'Noto Sans KR',sans-serif;
}
.qbtn:hover{border-color:var(--burg-soft);color:var(--burg-soft);background:var(--burg-pale);}

/* 메시지 버블 */
.msg-u{display:flex;justify-content:flex-end;margin-bottom:6px;}
.msg-a{display:flex;justify-content:flex-start;margin-bottom:6px;}
.bub-u{
  max-width:75%;padding:10px 14px;
  background:var(--burg-soft);color:#fff;
  font-size:13px;line-height:1.6;
  border-radius:16px 16px 2px 16px;
}
.bub-a{
  max-width:88%;
  background:#fff;
  border:1px solid var(--bd);
  border-left:2px solid var(--burg-light);
  padding:12px 14px;
  font-family:'Noto Serif KR',serif;
  font-size:13px;font-weight:200;
  line-height:2;color:var(--t2);
  white-space:pre-wrap;
  border-radius:2px 16px 16px 16px;
}
.a-label{font-size:9px;color:var(--t4);letter-spacing:2px;margin-bottom:5px;}
.typing-txt{color:#9a6068;font-style:italic;font-size:12px;}

/* 입력창 */
.input-wrap{
  padding:10px 16px 14px;
  background:#fff;
  border-top:1px solid var(--bd);
  flex-shrink:0;
}
.input-row{display:flex;gap:8px;align-items:center;}
.inp{
  flex:1;
  background:var(--cream2);
  border:1px solid var(--bd);
  border-radius:22px;
  color:var(--t1);
  padding:10px 16px;
  font-size:13px;
  font-family:'Noto Sans KR',sans-serif;
  outline:none;
  transition:border-color .2s;
}
.inp:focus{border-color:var(--burg-soft);background:#fff;}
.sbtn{
  width:40px;height:40px;flex-shrink:0;
  background:var(--burg-soft);
  border:none;border-radius:50%;
  color:#fff;font-size:18px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.sbtn:hover{background:var(--burg-light);}
.sbtn:disabled{background:var(--bd2);cursor:not-allowed;}

/* 전문가 매칭 */
.masters{
  background:#fff;
  border-top:1px solid var(--bd);
  flex-shrink:0;
}
.m-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px 8px;
}
.m-title{
  font-family:'Noto Serif KR',serif;
  font-size:13px;color:var(--t1);letter-spacing:2px;
}
.m-more{font-size:11px;color:var(--t3);cursor:pointer;}
.m-more:hover{color:var(--burg-soft);}
.m-list{
  display:flex;gap:10px;
  padding:4px 16px 14px;
  overflow-x:auto;scrollbar-width:none;
}
.m-list::-webkit-scrollbar{display:none;}
.mcard{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--cream2);
  border:1px solid var(--bd);
  border-radius:8px;
  min-width:152px;
  cursor:pointer;
  transition:all .2s;
}
.mcard:hover{border-color:var(--burg-border);background:var(--burg-pale);}
.mavatar{
  width:40px;height:40px;border-radius:50%;
  background:var(--burg-pale);
  border:1px solid var(--burg-border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif KR',serif;font-size:16px;color:var(--burg-soft);
  flex-shrink:0;position:relative;
}
.monline{
  position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;border-radius:50%;
  background:#52a865;border:1.5px solid var(--cream2);
}
.mname{font-size:12px;color:var(--t1);margin-bottom:2px;font-weight:400;}
.mspec{font-size:10px;color:var(--t3);}

/* PC 배경 */
@media(min-width:430px){
  body{background:#f0e8e0;}
}
</style>
</head>
<body>

<div class="app">

  <!-- 네비 -->
  <nav class="nav">
    <div class="nav-logo-wrap">
      <svg width="34" height="34" viewBox="0 0 54 54" fill="none">
        <polygon points="27,3 50,15.5 50,38.5 27,51 4,38.5 4,15.5" stroke="#d4a0a8" stroke-width="1.2" fill="none"/>
        <polygon points="27,9 45,19 45,35 27,45 9,35 9,19" stroke="#d4a0a8" stroke-width="0.4" fill="none" opacity="0.4"/>
        <text x="27" y="33" text-anchor="middle" font-family="serif" font-size="18" font-weight="200" fill="#d4a0a8">運</text>
      </svg>
      <div class="nav-text">
        <div class="nav-main">운세인사이트</div>
        <div class="nav-eng">UNSE INSIGHT</div>
      </div>
    </div>
    <div class="nav-icons">
      <svg class="nav-ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <svg class="nav-ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
  </nav>

  <!-- 히어로 -->
  <div class="hero">
    <div class="hero-greeting">오늘의 운세</div>
    <div class="hero-title">당신의 사주에는<br><span>이미 답이 있습니다</span></div>
    <div class="today-box">
      <div>
        <div class="today-label">TODAY</div>
        <div class="today-val" id="todayDate">2025년 6월 6일 · 甲辰年</div>
      </div>
      <div>
        <div class="today-star">★★★★</div>
        <div class="today-starlabel">오늘의 운세</div>
      </div>
    </div>
  </div>

  <!-- 카테고리 탭 -->
  <div class="cats">
    <div class="cat on" onclick="selCat(this,'사주','사주팔자 기반 운명 분석')">
      <div class="cat-ico">命</div><div class="cat-nm">사주</div>
    </div>
    <div class="cat" onclick="selCat(this,'운세','오늘의 기운과 흐름')">
      <div class="cat-ico">運</div><div class="cat-nm">운세</div>
    </div>
    <div class="cat" onclick="selCat(this,'연애','인연과 감정의 흐름')">
      <div class="cat-ico">緣</div><div class="cat-nm">연애</div>
    </div>
    <div class="cat" onclick="selCat(this,'풍수','공간의 기운 분석')">
      <div class="cat-ico">風</div><div class="cat-nm">풍수</div>
    </div>
    <div class="cat" onclick="selCat(this,'성리학','삶의 철학적 방향')">
      <div class="cat-ico">理</div><div class="cat-nm">성리학</div>
    </div>
  </div>

  <!-- AI 채팅 -->
  <div class="chat-wrap">
    <div class="chat-area" id="chatArea">
      <div class="intro-card">
        <div class="intro-title" id="introTitle">사주 상담</div>
        <div class="intro-sub" id="introSub">생년월일과 궁금한 점을 입력하시면<br>전문가 수준의 사주 해석을 드려요</div>
      </div>
      <div class="quick">
        <div class="qbtn" onclick="qAsk('올해 운세가 궁금해요')">올해 운세</div>
        <div class="qbtn" onclick="qAsk('연애운을 봐주세요')">연애운</div>
        <div class="qbtn" onclick="qAsk('직업과 재물운이 궁금해요')">직업·재물운</div>
        <div class="qbtn" onclick="qAsk('현재 고민이 있어요')">고민 상담</div>
      </div>
      <div id="msgs"></div>
    </div>

    <div class="input-wrap">
      <div class="input-row">
        <input class="inp" id="inp" placeholder="생년월일과 질문을 입력하세요" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}">
        <button class="sbtn" id="sbtn" onclick="send()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 전문가 매칭 -->
  <div class="masters">
    <div class="m-head">
      <div class="m-title">전문가 매칭</div>
      <div class="m-more">전체보기 →</div>
    </div>
    <div class="m-list">
      <div class="mcard" style="flex-direction:column;align-items:flex-start;gap:10px;min-width:160px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="mavatar">道<div class="monline"></div></div>
          <div><div class="mname">청운 선생</div><div class="mspec">사주·명리 · 22년</div></div>
        </div>
        <div style="display:flex;gap:6px;width:100%;">
          <button onclick="location.href='booking.html'" style="flex:1;padding:7px 0;background:var(--burg-soft);border:none;color:#fff;font-size:11px;border-radius:4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;">예약하기</button>
          <button onclick="location.href='matching.html'" style="flex:1;padding:7px 0;background:transparent;border:1px solid var(--bd2);color:var(--t2);font-size:11px;border-radius:4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;">도사화면</button>
        </div>
      </div>
      <div class="mcard" style="flex-direction:column;align-items:flex-start;gap:10px;min-width:160px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="mavatar">易</div>
          <div><div class="mname">혜담 선생</div><div class="mspec">풍수·연애 · 15년</div></div>
        </div>
        <div style="display:flex;gap:6px;width:100%;">
          <button onclick="location.href='booking.html'" style="flex:1;padding:7px 0;background:var(--burg-soft);border:none;color:#fff;font-size:11px;border-radius:4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;">예약하기</button>
          <button onclick="location.href='matching.html'" style="flex:1;padding:7px 0;background:transparent;border:1px solid var(--bd2);color:var(--t2);font-size:11px;border-radius:4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;">도사화면</button>
        </div>
      </div>
      <div class="mcard" style="flex-direction:column;align-items:flex-start;gap:10px;min-width:160px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="mavatar">玄<div class="monline"></div></div>
          <div><div class="mname">백운 선생</div><div class="mspec">성리학·운세 · 18년</div></div>
        </div>
        <div style="display:flex;gap:6px;width:100%;">
          <button onclick="location.href='booking.html'" style="flex:1;padding:7px 0;background:var(--burg-soft);border:none;color:#fff;font-size:11px;border-radius:4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;">예약하기</button>
          <button onclick="location.href='matching.html'" style="flex:1;padding:7px 0;background:transparent;border:1px solid var(--bd2);color:var(--t2);font-size:11px;border-radius:4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;">도사화면</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
var cat = '사주';

function selCat(el, name, sub) {
  document.querySelectorAll('.cat').forEach(function(c){ c.classList.remove('on'); });
  el.classList.add('on');
  cat = name;
  document.getElementById('introTitle').textContent = name + ' 상담';
  document.getElementById('introSub').textContent = sub + '\n생년월일과 궁금한 점을 입력해주세요';
  document.getElementById('msgs').innerHTML = '';
}

function qAsk(t) {
  document.getElementById('inp').value = t;
  send();
}

async function send() {
  var inp = document.getElementById('inp');
  var t = inp.value.trim();
  if (!t) return;
  inp.value = '';

  var msgs = document.getElementById('msgs');
  var sbtn = document.getElementById('sbtn');
  sbtn.disabled = true;

  msgs.innerHTML += '<div class="msg-u"><div class="bub-u">' + t + '</div></div>';

  var id = 'ai' + Date.now();
  msgs.innerHTML += '<div class="msg-a"><div class="bub-a"><div class="a-label">운세인사이트</div><div id="' + id + '" class="typing-txt">해석 중...</div></div></div>';

  var ca = document.getElementById('chatArea');
  ca.scrollTop = ca.scrollHeight;

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        system: '당신은 운세인사이트의 ' + cat + ' 전문 AI 상담사입니다. 20년 경력 명리학 전문가의 따뜻하고 품격 있는 문어체로 3~4문단, 핵심만 현실적이고 희망적으로 답변해주세요.',
        messages: [{ role: 'user', content: t }]
      })
    });
    var data = await res.json();
    var answer = data.content && data.content[0] && data.content[0].text;
    var el = document.getElementById(id);
    el.className = '';
    el.textContent = answer || '답변을 받지 못했어요. 다시 시도해주세요.';
  } catch(e) {
    document.getElementById(id).textContent = '오류가 발생했어요. 다시 시도해주세요.';
  }

  sbtn.disabled = false;
  ca.scrollTop = ca.scrollHeight;
}
</script>

</body>
</html>
